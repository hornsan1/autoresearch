[project]
name = "autoresearch-qlora"
version = "0.1.0"
description = "Autonomous QLoRA fine-tuning for MutualBase agents"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "torch==2.9.1",
    "transformers>=4.48.0",
    "peft>=0.14.0",
    "bitsandbytes>=0.45.0",
    "accelerate>=1.3.0",
    "datasets>=3.3.0",
]

[tool.uv.sources]
torch = [
    { index = "pytorch-cu128" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true
